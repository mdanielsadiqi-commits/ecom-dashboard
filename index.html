<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Ecom Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#f0f0f0;font-family:Georgia,serif;min-height:100vh}
button{cursor:pointer;font-family:Georgia,serif;border:none;outline:none}
input,textarea,select{font-family:Georgia,serif;outline:none}
.page{padding:16px 16px 100px;display:flex;flex-direction:column;gap:12px}
.nav{background:#111;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:99}
.bnav{background:#0a0a0a;border-top:1px solid #222;padding:10px 16px;display:flex;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:99}
.btab{flex:1;padding:8px 4px;border-radius:12px;font-size:11px;background:none;color:#555;border:1px solid transparent;text-align:center}
.btab.active{background:#1a1a1a;color:#f0f0f0;border-color:#333}
.nbtn{font-size:12px;padding:6px 12px;border-radius:20px;color:#888;background:#1a1a1a;border:1px solid #2a2a2a}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:16px}
.bbg{height:3px;background:#222;border-radius:2px}
.bb{height:100%;border-radius:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:10px}
.dbtn{flex:1;padding:7px 3px;border-radius:10px;font-size:11px;background:#1a1a1a;color:#666;border:1px solid #222;text-align:center}
.dbtn.active{background:#60a5fa18;color:#60a5fa;border-color:#60a5fa44;font-weight:700}
.dbtn.today{border-color:#f59e0b44;color:#f59e0b}
.narea{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:10px;color:#e8e8e8;font-size:13px;line-height:1.6;resize:none;min-height:70px}
.clinput{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#e8e8e8;font-size:13px;flex:1}
.bc{width:44px;height:44px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;font-size:22px;flex-shrink:0;-webkit-user-select:none;user-select:none;display:flex;align-items:center;justify-content:center}
.bonus{background:#f59e0b22;color:#f59e0b;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;margin-right:4px}
.sync-dot.syncing{background:#f59e0b}
.star{color:#f59e0b;font-size:16px;cursor:pointer}
.star.off{color:#333}
.finput{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:7px 10px;color:#e8e8e8;font-size:13px;width:100%}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;display:inline-block}
.mood-btn{flex:1;padding:8px;border-radius:12px;font-size:18px;background:#1a1a1a;border:1px solid #222}
.mood-btn.selected{border-color:#60a5fa;background:#60a5fa18}
</style>
</head>
<body>
<div id="app">Laedt...</div>
<div class="bnav" id="bnav" style="display:none">
  <button class="btab" id="tab_day" onclick="setTab('day')">Tag</button>
  <button class="btab" id="tab_products" onclick="setTab('products')">Produkte</button>
  <button class="btab" id="tab_pipeline" onclick="setTab('pipeline')">Pipeline</button>
  <button class="btab" id="tab_overview" onclick="setTab('overview')">Uebersicht</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBT1SPluJxSwXBSJB3_XyLZgfNgWKZgyIw",
  authDomain:"ecommonaglobal.firebaseapp.com",
  projectId:"ecommonaglobal",
  storageBucket:"ecommonaglobal.firebasestorage.app",
  messagingSenderId:"945353153605",
  appId:"1:945353153605:web:df7119e7514cdc6c7a172c"
});
var db = firebase.firestore();

var USERS = ["MO","Nawid"];
var UCOL = {MO:"#60a5fa",Nawid:"#f59e0b"};
var DAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
var DNAMES = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
var TASKS = [
  {id:"work",label:"Arbeitsplatz Check-in",sub:"8 Uhr morgens",color:"#60a5fa"},
  {id:"tt1",label:"Product Research TikTok",sub:"Session 1 - 30 Min",color:"#e879f9"},
  {id:"tt2",label:"Product Research TikTok",sub:"Session 2 - 30 Min",color:"#e879f9"},
  {id:"ig1",label:"Product Research Instagram",sub:"Session 1 - 30 Min",color:"#f43f5e"},
  {id:"ig2",label:"Product Research Instagram",sub:"Session 2 - 30 Min",color:"#f43f5e"},
  {id:"vid",label:"Videos schneiden",sub:"3 Videos Ziel",color:"#34d399",hasCount:true,goal:3},
  {id:"sleep",label:"Sleep 23 Uhr",sub:"Spaetestens 23:00",color:"#94a3b8"}
];
var MOODS = [{e:"&#128522;",l:"Gut"},{e:"&#128528;",l:"Ok"},{e:"&#128532;",l:"Schlecht"}];
var PIPELINE_STAGES = ["Gefunden","Analysiert","Getestet","Aktiv","Pausiert"];
var STAGE_COLORS = {Gefunden:"#60a5fa",Analysiert:"#e879f9",Getestet:"#f59e0b",Aktiv:"#34d399",Pausiert:"#555"};

var view = "day";
var cDay = 0;
var cTab = "week";
var cProduct = null;
var cPipeline = null;
var W = "";
var mI = null;

var DATA = {chk:{},money:{},notes:{},checklist:{},absence:{},watchlist:[],products:[],pipeline:[],ideas:[],moods:{},reviews:{}};

function getWeekKey(){
  var d=new Date(),dy=d.getDay();
  var di=d.getDate()-dy+(dy===0?-6:1);
  var m=new Date(d.getFullYear(),d.getMonth(),di);
  return m.getFullYear()+"_"+m.getMonth()+"_"+m.getDate();
}
function todayIdx(){var map={1:0,2:1,3:2,4:3,5:4,6:5,0:6};return map[new Date().getDay()];}
function isSunday(){return new Date().getDay()===0;}
function getSundayKey(){
  var d=new Date();
  var dy=d.getDay();
  var diff=dy===0?0:7-dy;
  var sun=new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff);
  return sun.getFullYear()+"_"+sun.getMonth()+"_"+sun.getDate();
}
function getLastSundayKey(){
  var d=new Date();
  var dy=d.getDay();
  var diff=dy===0?7:dy;
  var sun=new Date(d.getFullYear(),d.getMonth(),d.getDate()-diff);
  return sun.getFullYear()+"_"+sun.getMonth()+"_"+sun.getDate();
}

// Firebase
function loadData(){
  W=getWeekKey();
  db.collection("ec2").doc("global").onSnapshot(function(snap){
    if(snap.exists){
      var d=snap.data();
      DATA.watchlist=d.watchlist||[];
      DATA.products=d.products||[];
      DATA.pipeline=d.pipeline||[];
      DATA.ideas=d.ideas||[];
    }
    db.collection("ec2").doc(W).onSnapshot(function(snap2){
      if(snap2.exists){
        var d2=snap2.data();
        DATA.chk=d2.chk||{};
        DATA.money=d2.money||{};
        DATA.notes=d2.notes||{};
        DATA.checklist=d2.checklist||{};
        DATA.absence=d2.absence||{};
        DATA.moods=d2.moods||{};
      }
      db.collection("ec2_reviews").doc("all").onSnapshot(function(snap3){
        if(snap3.exists) DATA.reviews=snap3.data()||{};
        render();
        document.getElementById("bnav").style.display="flex";
      });
    });
  });
}

var saveGTimer=null,saveWTimer=null;
function saveGlobal(){
  clearTimeout(saveGTimer);
  saveGTimer=setTimeout(function(){
    db.collection("ec2").doc("global").set({
      watchlist:DATA.watchlist,
      products:DATA.products,
      pipeline:DATA.pipeline,
      ideas:DATA.ideas
    },{merge:true}).catch(function(){});
  },600);
}
function saveWeek(){
  clearTimeout(saveWTimer);
  saveWTimer=setTimeout(function(){
    db.collection("ec2").doc(W).set({
      chk:DATA.chk,money:DATA.money,notes:DATA.notes,
      checklist:DATA.checklist,absence:DATA.absence,moods:DATA.moods
    },{merge:true}).catch(function(){});
  },600);
}
function saveReviews(){
  db.collection("ec2_reviews").doc("all").set(DATA.reviews,{merge:true}).catch(function(){});
}

// Tab navigation
function setTab(t){
  view=t;
  document.querySelectorAll(".btab").forEach(function(b){b.classList.remove("active");});
  var el=document.getElementById("tab_"+t);
  if(el)el.classList.add("active");
  render();
  window.scrollTo(0,0);
}
window.setTab=setTab;

// Tasks
function toggleTask(day,user,taskId){
  DATA.chk[day+"_"+user+"_"+taskId]=!DATA.chk[day+"_"+user+"_"+taskId];
  saveWeek();render();
}
function setCount(day,user,taskId,val){
  DATA.chk[day+"_"+user+"_"+taskId+"_v"]=Math.max(0,val);
  saveWeek();
  var el=document.getElementById("cnt_"+day+"_"+user+"_"+taskId);
  if(el)el.innerHTML=countHTML(day,user,taskId);
}
function countHTML(day,user,taskId){
  var k=day+"_"+user+"_"+taskId+"_v",v=DATA.chk[k]||0,goal=3;
  var col=v>=goal?"#34d399":UCOL[user];
  var h="<div style='display:flex;align-items:center;gap:6px;margin-top:6px'>";
  h+="<button class='bc' onclick='setCount("+day+",\""+user+"\",\""+taskId+"\","+(v-1)+")'>-</button>";
  h+="<div style='flex:1;text-align:center'><span style='font-size:22px;font-weight:800;color:"+col+"'>"+v+"</span><span style='font-size:12px;color:#555'>/"+goal+"</span>";
  if(v>goal)h+=" <span class='bonus'>+"+( v-goal)+" BONUS</span>";
  h+="</div><button class='bc' onclick='setCount("+day+",\""+user+"\",\""+taskId+"\","+(v+1)+")'>+</button></div>";
  h+="<div class='bbg' style='margin-top:6px;overflow:hidden'><div class='bb' style='background:"+col+";width:"+Math.min(100,(v/goal)*100)+"%'></div></div>";
  return h;
}

// Money
function mStart(day,a){
  mStop();
  var k="d"+day;
  DATA.money[k]=Math.max(0,(DATA.money[k]||0)+a);
  saveWeek();refreshMoney(day);
  mI=setInterval(function(){
    DATA.money[k]=Math.max(0,(DATA.money[k]||0)+a);
    saveWeek();refreshMoney(day);
  },130);
}
function mStop(){if(mI){clearInterval(mI);mI=null;}}
function mAdj(day,a){DATA.money["d"+day]=Math.max(0,(DATA.money["d"+day]||0)+a);saveWeek();refreshMoney(day);}
function refreshMoney(day){var el=document.getElementById("mbox_"+day);if(el)el.innerHTML=moneyHTML(day);}
function moneyHTML(day){
  var v=DATA.money["d"+day]||0,col=v>0?"#34d399":"#555";
  var h="<div style='text-align:center;margin-bottom:12px'>";
  h+="<span style='font-size:36px;font-weight:800;color:"+col+"'>&#8364;"+v.toLocaleString()+"</span>";
  if(v>0)h+="<div style='font-size:11px;color:#34d399;margin-top:2px'>verdient heute</div>";
  h+="</div><div style='display:flex;align-items:center;gap:8px'>";
  h+="<button class='bc' ontouchstart='event.preventDefault();mStart("+day+",-10)' ontouchend='event.preventDefault();mStop()' onmousedown='mStart("+day+",-10)' onmouseup='mStop()' onmouseleave='mStop()'>-</button>";
  h+="<div style='display:flex;flex-direction:column;gap:4px;flex:1'>";
  h+="<button onclick='mAdj("+day+",-100)' style='background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:5px;color:#666;font-size:11px'>- 100</button>";
  h+="<button onclick='mAdj("+day+",100)' style='background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:5px;color:#666;font-size:11px'>+ 100</button>";
  h+="</div><button class='bc' ontouchstart='event.preventDefault();mStart("+day+",10)' ontouchend='event.preventDefault();mStop()' onmousedown='mStart("+day+",10)' onmouseup='mStop()' onmouseleave='mStop()'>+</button></div>";
  return h;
}

// Mood
function setMood(day,user,mood){
  if(!DATA.moods[day])DATA.moods[day]={};
  DATA.moods[day][user]=mood;
  saveWeek();
  var el=document.getElementById("mood_"+day+"_"+user);
  if(el)el.innerHTML=moodHTML(day,user);
}
function moodHTML(day,user){
  var cur=DATA.moods[day]&&DATA.moods[day][user]||null;
  var uc=UCOL[user];
  var h="<div style='display:flex;gap:6px;margin-top:6px'>";
  for(var i=0;i<MOODS.length;i++){
    var m=MOODS[i],sel=cur===m.l;
    h+="<button onclick='setMood("+day+",\""+user+"\",\""+m.l+"\")' class='mood-btn"+(sel?" selected":"")+"' style='"+(sel?"border-color:"+uc+";background:"+uc+"22":"")+"'>"+m.e+"</button>";
  }
  h+="</div>";
  if(cur)h+="<div style='font-size:11px;color:"+uc+";margin-top:4px'>"+user+": "+cur+"</div>";
  return h;
}

// Notes
function saveSharedNote(day,val){DATA.notes["shared_"+day]=val;saveWeek();}
function saveAbsence(day,user,val){DATA.absence[day+"_"+user]=val;saveWeek();}

// Checklist
function getCL(day){return DATA.checklist["d"+day]||[];}
function clHTML(day){
  var list=getCL(day);
  if(!list.length)return "<div style='font-size:12px;color:#333;padding:4px 0'>Noch keine Eintraege...</div>";
  var h="";
  for(var i=0;i<list.length;i++){
    var item=list[i];
    h+="<div onclick='toggleCL("+day+","+i+")' style='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a;cursor:pointer'>";
    h+="<div style='width:16px;height:16px;border-radius:4px;border:1px solid "+(item.done?"#34d399":"#333")+";background:"+(item.done?"#34d399":"transparent")+";flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000'>"+(item.done?"v":"")+"</div>";
    h+="<div style='font-size:13px;color:"+(item.done?"#444":"#e8e8e8")+";"+(item.done?"text-decoration:line-through":"")+">"+item.text+"</div></div>";
  }
  return h;
}
function addCLItem(day){
  var input=document.getElementById("cl_input_"+day);
  if(!input)return;
  var val=input.value.trim();if(!val)return;
  if(val[0]!=="-")val="- "+val;
  var list=getCL(day);list.push({text:val,done:false});
  DATA.checklist["d"+day]=list;saveWeek();input.value="";
  var el=document.getElementById("cl_list_"+day);if(el)el.innerHTML=clHTML(day);
}
function toggleCL(day,idx){
  var list=getCL(day);if(list[idx])list[idx].done=!list[idx].done;
  DATA.checklist["d"+day]=list;saveWeek();
  var el=document.getElementById("cl_list_"+day);if(el)el.innerHTML=clHTML(day);
}

// Watchlist
function wlHTML(){
  var list=DATA.watchlist||[];
  if(!list.length)return "<div style='font-size:12px;color:#333;padding:4px 0'>Noch keine Produkte...</div>";
  var h="";
  for(var i=0;i<list.length;i++){
    var item=list[i];
    h+="<div style='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a'>";
    h+="<div onclick='toggleWL("+i+")' style='width:16px;height:16px;border-radius:4px;border:1px solid "+(item.done?"#a78bfa":"#333")+";background:"+(item.done?"#a78bfa":"transparent")+";flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000'>"+(item.done?"v":"")+"</div>";
    h+="<div style='font-size:13px;color:"+(item.done?"#444":"#e8e8e8")+";flex:1;"+(item.done?"text-decoration:line-through":"")+">"+item.text+"</div>";
    h+="<button onclick='removeWL("+i+")' style='background:none;color:#333;font-size:16px;padding:2px 6px'>x</button></div>";
  }
  return h;
}
function addWL(){
  var input=document.getElementById("wl_input");if(!input)return;
  var val=input.value.trim();if(!val)return;
  if(!DATA.watchlist)DATA.watchlist=[];
  DATA.watchlist.push({text:val,done:false});saveGlobal();input.value="";
  var el=document.getElementById("wl_list");if(el)el.innerHTML=wlHTML();
}
function toggleWL(idx){
  if(!DATA.watchlist)return;DATA.watchlist[idx].done=!DATA.watchlist[idx].done;saveGlobal();
  var el=document.getElementById("wl_list");if(el)el.innerHTML=wlHTML();
}
function removeWL(idx){
  if(!DATA.watchlist)return;DATA.watchlist.splice(idx,1);saveGlobal();
  var el=document.getElementById("wl_list");if(el)el.innerHTML=wlHTML();
}

// Ideas
function ideasHTML(){
  var list=DATA.ideas||[];
  if(!list.length)return "<div style='font-size:12px;color:#333;padding:4px 0'>Noch keine Ideen...</div>";
  var h="";
  for(var i=0;i<list.length;i++){
    var item=list[i];
    h+="<div style='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a'>";
    h+="<div style='font-size:11px;color:#f59e0b;flex-shrink:0'>*</div>";
    h+="<div style='font-size:13px;color:#e8e8e8;flex:1'>"+item+"</div>";
    h+="<button onclick='removeIdea("+i+")' style='background:none;color:#333;font-size:16px;padding:2px 6px'>x</button></div>";
  }
  return h;
}
function addIdea(){
  var input=document.getElementById("idea_input");if(!input)return;
  var val=input.value.trim();if(!val)return;
  if(!DATA.ideas)DATA.ideas=[];
  DATA.ideas.push(val);saveGlobal();input.value="";
  var el=document.getElementById("idea_list");if(el)el.innerHTML=ideasHTML();
}
function removeIdea(idx){
  DATA.ideas.splice(idx,1);saveGlobal();
  var el=document.getElementById("idea_list");if(el)el.innerHTML=ideasHTML();
}

// Products (Datenbank mit Bewertung)
function starsHTML(pid,user,val){
  var h="<div style='display:flex;gap:2px'>";
  for(var i=1;i<=5;i++){
    h+="<span onclick='setProductStar(\""+pid+"\",\""+user+"\","+i+")' style='font-size:18px;cursor:pointer;color:"+(i<=val?"#f59e0b":"#333")+"'>&#9733;</span>";
  }
  h+="</div>";
  return h;
}
function setProductStar(pid,user,val){
  var p=getProductById(pid);if(!p)return;
  if(!p.stars)p.stars={};
  p.stars[user]=val;
  saveGlobal();
  var el=document.getElementById("stars_"+pid+"_"+user);
  if(el)el.innerHTML=starsHTML(pid,user,val);
}
function getProductById(pid){
  for(var i=0;i<DATA.products.length;i++){if(DATA.products[i].id===pid)return DATA.products[i];}
  return null;
}
function addProduct(){
  var name=document.getElementById("prod_name");if(!name||!name.value.trim())return;
  var p={
    id:"p"+Date.now(),name:name.value.trim(),
    ek:"",vk:"",stars:{MO:0,Nawid:0},
    concSocials:"",concWeb:"",notes:"",createdAt:Date.now()
  };
  DATA.products.push(p);saveGlobal();
  name.value="";
  setTab("products");
}
function saveProductField(pid,field,val){
  var p=getProductById(pid);if(!p)return;
  p[field]=val;saveGlobal();
}
function deleteProduct(pid){
  DATA.products=DATA.products.filter(function(p){return p.id!==pid;});
  saveGlobal();cProduct=null;setTab("products");
}
function avgStars(p){
  var s=(p.stars&&p.stars.MO||0)+(p.stars&&p.stars.Nawid||0);
  return (s/2).toFixed(1);
}
function profit(p){
  var ek=parseFloat(p.ek)||0,vk=parseFloat(p.vk)||0;
  return vk>0&&ek>0?(vk-ek).toFixed(2):null;
}

// Pipeline
function addPipelineProduct(){
  var name=document.getElementById("pp_name");if(!name||!name.value.trim())return;
  var p={
    id:"pp"+Date.now(),name:name.value.trim(),
    stage:"Gefunden",
    socials:"",shops:"",niche:"",keywords:"",
    likes:"",concepts:"",notes:"",createdAt:Date.now()
  };
  DATA.pipeline.push(p);saveGlobal();
  name.value="";render();
}
function getPipelineById(pid){
  for(var i=0;i<DATA.pipeline.length;i++){if(DATA.pipeline[i].id===pid)return DATA.pipeline[i];}
  return null;
}
function savePipelineField(pid,field,val){
  var p=getPipelineById(pid);if(!p)return;
  p[field]=val;saveGlobal();
}
function setPipelineStage(pid,stage){
  var p=getPipelineById(pid);if(!p)return;
  p.stage=stage;saveGlobal();
  var el=document.getElementById("stage_"+pid);
  if(el)el.innerHTML=stageHTML(pid);
}
function stageHTML(pid){
  var p=getPipelineById(pid);if(!p)return"";
  var h="<div style='display:flex;gap:4px;flex-wrap:wrap;margin-top:8px'>";
  for(var i=0;i<PIPELINE_STAGES.length;i++){
    var s=PIPELINE_STAGES[i],sel=p.stage===s;
    var sc=STAGE_COLORS[s];
    h+="<button onclick='setPipelineStage(\""+pid+"\",\""+s+"\")' style='font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid "+(sel?sc:"#333")+";background:"+(sel?sc+"22":"transparent")+";color:"+(sel?sc:"#555")+"'>"+s+"</button>";
  }
  h+="</div>";
  return h;
}
function deletePipeline(pid){
  DATA.pipeline=DATA.pipeline.filter(function(p){return p.id!==pid;});
  saveGlobal();cPipeline=null;render();
}

// Streak
function calcStreak(){
  var streak=0,today=todayIdx();
  for(var d=today;d>=0;d--){
    var allDone=true;
    for(var ui=0;ui<USERS.length;ui++){
      for(var ti=0;ti<TASKS.length;ti++){
        var t=TASKS[ti];
        if(t.hasCount){if((DATA.chk[d+"_"+USERS[ui]+"_"+t.id+"_v"]||0)<t.goal){allDone=false;break;}}
        else{if(!DATA.chk[d+"_"+USERS[ui]+"_"+t.id]){allDone=false;break;}}
      }
      if(!allDone)break;
    }
    if(allDone)streak++;else break;
  }
  return streak;
}

// Weekly review
function saveReview(key,field,val){
  if(!DATA.reviews[key])DATA.reviews[key]={};
  DATA.reviews[key][field]=val;
  saveReviews();
}

// Stats
function userDayDone(day,user){
  var done=0,total=TASKS.length;
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i];
    if(t.hasCount){if((DATA.chk[day+"_"+user+"_"+t.id+"_v"]||0)>=t.goal)done++;}
    else{if(DATA.chk[day+"_"+user+"_"+t.id])done++;}
  }
  return{done:done,total:total};
}
function weekTotal(){var t=0;for(var i=0;i<7;i++)t+=DATA.money["d"+i]||0;return t;}

// Reset
function resetDay(day){
  var prefix=day+"_",newChk={};
  for(var k in DATA.chk){if(k.indexOf(prefix)!==0)newChk[k]=DATA.chk[k];}
  DATA.chk=newChk;
  delete DATA.money["d"+day];
  delete DATA.notes["shared_"+day];
  delete DATA.checklist["d"+day];
  delete DATA.moods[day];
  for(var ui=0;ui<USERS.length;ui++)delete DATA.absence[day+"_"+USERS[ui]];
  saveWeek();render();
}
function resetWeek(){
  DATA.chk={};DATA.money={};DATA.notes={};DATA.checklist={};DATA.absence={};DATA.moods={};
  saveWeek();render();
}

      h+="<div class='card' style='border-top:3px solid "+uc+";text-align:center'>";
      h+="<div style='font-size:13px;font-weight:700;color:"+uc+";margin-bottom:6px'>"+user+"</div>";
      h+="<div style='font-size:30px;font-weight:800;color:"+uc+"'>"+pct+"%</div>";
      h+="<div style='font-size:11px;color:#555;margin-top:2px'>"+td+"/"+ta+" Aufgaben</div>";
      h+="<div class='bbg' style='margin-top:8px'><div class='bb' style='background:"+uc+";width:"+pct+"%'></div></div></div>";
    }
    h+="</div>";
    // Day breakdown
    h+="<div class='st' style='margin-top:4px'>Tag fuer Tag</div>";
    for(var di=0;di<7;di++){
      var isTd=di===todayIdx(),dc=isTd?"#60a5fa":"#2a2a2a",mv=DATA.money["d"+di]||0;
      h+="<div onclick='goDay("+di+")' style='background:#111;border:1px solid #222;border-left:3px solid "+dc+";border-radius:14px;padding:12px 14px;cursor:pointer'>";
      h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'>";
      h+="<div style='font-size:14px;font-weight:700'>"+DNAMES[di]+(isTd?" <span style='font-size:10px;color:#60a5fa'>Heute</span>":"")+"</div>";
      h+="<div style='font-size:13px;color:#34d399;font-weight:700'>&#8364;"+mv.toLocaleString()+"</div></div>";
      h+="<div class='grid2'>";
      for(var ui=0;ui<USERS.length;ui++){
        var user=USERS[ui],uc=UCOL[user],res=userDayDone(di,user);
        var pct2=res.total>0?Math.round((res.done/res.total)*100):0;
        var mood=DATA.moods[di]&&DATA.moods[di][user]||"";
        var moodE=MOODS.find(function(m){return m.l===mood;});
        h+="<div style='background:#0a0a0a;border-radius:8px;padding:6px 8px'>";
        h+="<div style='font-size:10px;color:"+uc+";font-weight:700;margin-bottom:4px'>"+user+(moodE?" "+moodE.e:"")+"</div>";
        h+="<div style='font-size:13px;font-weight:700;color:"+(pct2===100?"#34d399":"#888")+"'>"+pct2+"%</div>";
        h+="<div class='bbg' style='margin-top:4px'><div class='bb' style='background:"+uc+";width:"+pct2+"%'></div></div></div>";
      }
      h+="</div>";
      var hasAbs=false;
      for(var ui=0;ui<USERS.length;ui++){if(DATA.absence[di+"_"+USERS[ui]])hasAbs=true;}
      if(hasAbs){
        h+="<div style='margin-top:8px;border-top:1px solid #1a1a1a;padding-top:8px'>";
        for(var ui=0;ui<USERS.length;ui++){
          var av=DATA.absence[di+"_"+USERS[ui]];
          if(av)h+="<div style='font-size:11px;color:#f59e0b;margin-top:3px'>"+USERS[ui]+": "+av+"</div>";
        }
        h+="</div>";
      }
      h+="</div>";
    }
    h+="<button onclick='resetWeek()' style='background:none;border:1px solid #1a1a1a;color:#333;font-size:11px;padding:8px;border-radius:12px;width:100%'>Woche zuruecksetzen</button>";
  }

  if(cTab==="review"){
    var sunKey=getSundayKey(),lastSunKey=getLastSundayKey();
    var fields=[
      {key:"good",label:"Was lief diese Woche gut?",ph:"Erfolge, Highlights..."},
      {key:"bad",label:"Was lief schlecht?",ph:"Probleme, Fehler..."},
      {key:"change",label:"Was aendern wir naechste Woche?",ph:"Konkrete Massnahmen..."}
    ];
    h+="<div class='card' style='border-top:3px solid #60a5fa'>";
    h+="<div class='st'>Wochenrueckblick - diese Woche</div>";
    for(var fi=0;fi<fields.length;fi++){
      var f=fields[fi];
      h+="<div style='margin-bottom:12px'>";
      h+="<div style='font-size:12px;color:#888;margin-bottom:6px'>"+f.label+"</div>";
      h+="<textarea class='narea' style='min-height:65px' placeholder='"+f.ph+"' onchange='saveReview(\""+sunKey+"\",\""+f.key+"\",this.value)' onblur='saveReview(\""+sunKey+"\",\""+f.key+"\",this.value)'>"+(DATA.reviews[sunKey]&&DATA.reviews[sunKey][f.key]||"")+"</textarea></div>";
    }
    h+="</div>";
    // Last week
    if(DATA.reviews[lastSunKey]){
      h+="<div class='card' style='border-top:3px solid #555'>";
      h+="<div class='st'>Letzter Rueckblick</div>";
      for(var fi=0;fi<fields.length;fi++){
        var f=fields[fi];
        var val=DATA.reviews[lastSunKey]&&DATA.reviews[lastSunKey][f.key]||"";
        if(val){
          h+="<div style='margin-bottom:12px'>";
          h+="<div style='font-size:11px;color:#555;margin-bottom:4px'>"+f.label+"</div>";
          h+="<div style='font-size:13px;color:#888;line-height:1.6;background:#0a0a0a;border-radius:8px;padding:10px'>"+val+"</div></div>";
        }
      }
      h+="</div>";
    }
  }

  if(cTab==="month"){
    h+="<div class='card' style='text-align:center;border-top:3px solid #34d399'>";
    h+="<div class='st'>Monatsblick (aktuelle Woche)</div>";
    h+="<div style='font-size:40px;font-weight:800;color:#34d399'>&#8364;"+weekTotal().toLocaleString()+"</div>";
    h+="<div style='font-size:12px;color:#555;margin-top:4px'>Diese Woche verdient</div></div>";
    for(var ui=0;ui<USERS.length;ui++){
      var user=USERS[ui],uc=UCOL[user];
      h+="<div class='card' style='border-left:4px solid "+uc+"'>";
      h+="<div style='font-size:14px;font-weight:700;color:"+uc+";margin-bottom:12px'>"+user+" - Wochenstatistik</div>";
      for(var ti=0;ti<TASKS.length;ti++){
        var task=TASKS[ti],taskDone=0;
        for(var di=0;di<7;di++){
          if(task.hasCount){taskDone+=Math.min(task.goal,DATA.chk[di+"_"+user+"_"+task.id+"_v"]||0);}
          else{if(DATA.chk[di+"_"+user+"_"+task.id])taskDone++;}
        }
        var taskMax=task.hasCount?task.goal*7:7,tpct=taskMax>0?Math.round((taskDone/taskMax)*100):0;
        h+="<div style='margin-bottom:8px'>";
        h+="<div style='display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px'>";
        h+="<span style='color:#888'>"+task.label+"</span><span style='color:"+uc+";font-weight:600'>"+taskDone+"/"+taskMax+"</span></div>";
        h+="<div class='bbg'><div class='bb' style='background:"+uc+";width:"+tpct+"%'></div></div></div>";
      }
      h+="</div>";
    }
  }

  h+="</div>";
  return h;
}

// Global nav helpers
window.goDay=function(d){view="day";if(d!==undefined)cDay=d;document.querySelectorAll(".btab").forEach(function(b){b.classList.remove("active");});var el=document.getElementById("tab_day");if(el)el.classList.add("active");render();window.scrollTo(0,0);};
window.openProduct=function(pid){cProduct=pid;view="products";render();window.scrollTo(0,0);};
window.openPipeline=function(pid){cPipeline=pid;view="pipeline";render();window.scrollTo(0,0);};
window.toggleTask=toggleTask;
window.setCount=setCount;
window.mStart=mStart;window.mStop=mStop;window.mAdj=mAdj;
window.setMood=setMood;
window.saveSharedNote=saveSharedNote;window.saveAbsence=saveAbsence;
window.addCLItem=addCLItem;window.toggleCL=toggleCL;
window.addWL=addWL;window.toggleWL=toggleWL;window.removeWL=removeWL;
window.addIdea=addIdea;window.removeIdea=removeIdea;
window.addProduct=addProduct;window.saveProductField=saveProductField;window.deleteProduct=deleteProduct;window.setProductStar=setProductStar;
window.addPipelineProduct=addPipelineProduct;window.savePipelineField=savePipelineField;window.setPipelineStage=setPipelineStage;window.deletePipeline=deletePipeline;window.stageHTML=stageHTML;
window.resetDay=resetDay;window.resetWeek=resetWeek;
window.saveReview=saveReview;

// Init
var d=new Date(),dy=d.getDay();
var map={1:0,2:1,3:2,4:3,5:4,6:5,0:6};
cDay=map[dy];
document.getElementById("tab_day").classList.add("active");
loadData();
</script>
