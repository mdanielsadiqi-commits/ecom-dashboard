<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Ecom Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#f0f0f0;font-family:Georgia,serif;min-height:100vh}
button{cursor:pointer;font-family:Georgia,serif;border:none;outline:none}
input,textarea{font-family:Georgia,serif;outline:none}
.page{padding:16px 16px 100px;display:flex;flex-direction:column;gap:12px}
.slide-in-left{animation:slideInLeft 0.25s ease}
.slide-in-right{animation:slideInRight 0.25s ease}
@keyframes slideInLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
.nav{background:#111;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:99}
.bnav{background:#0a0a0a;border-top:1px solid #222;padding:10px 16px;display:flex;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:99}
.btab{flex:1;padding:9px 4px;border-radius:12px;font-size:11px;background:none;color:#555;border:1px solid transparent;text-align:center}
.btab.active{background:#1a1a1a;color:#f0f0f0;border-color:#333}
.nbtn{font-size:12px;padding:6px 12px;border-radius:20px;color:#888;background:#1a1a1a;border:1px solid #2a2a2a}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:16px}
.bbg{height:3px;background:#222;border-radius:2px}
.bb{height:100%;border-radius:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:10px}
.dbtn{flex:1;padding:7px 3px;border-radius:10px;font-size:11px;background:#1a1a1a;color:#666;border:1px solid #222;text-align:center}
.dbtn.active{background:#60a5fa18;color:#60a5fa;border-color:#60a5fa44;font-weight:700}
.dbtn.today{border-color:#f59e0b44;color:#f59e0b}
.narea{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:10px;color:#e8e8e8;font-size:13px;line-height:1.6;resize:none;min-height:70px}
.clinput{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#e8e8e8;font-size:13px;flex:1}
.bc{width:44px;height:44px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;font-size:22px;flex-shrink:0;-webkit-user-select:none;user-select:none;display:flex;align-items:center;justify-content:center}
.bonus{background:#f59e0b22;color:#f59e0b;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.finput{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:7px 10px;color:#e8e8e8;font-size:13px;width:100%}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;display:inline-block}
.sec-divider{font-size:12px;font-weight:700;color:#888;padding:8px 0 4px;border-bottom:1px solid #1a1a1a;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">Laedt...</div>
<div class="bnav" id="bnav" style="display:none">
  <button class="btab" id="tab_day" onclick="setTab('day')">&#128197; Tag</button>
  <button class="btab" id="tab_products" onclick="setTab('products')">&#128722; Produkte</button>
  <button class="btab" id="tab_overview" onclick="setTab('overview')">&#128202; Uebersicht</button>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBT1SPluJxSwXBSJB3_XyLZgfNgWKZgyIw",
  authDomain:"ecommonaglobal.firebaseapp.com",
  projectId:"ecommonaglobal",
  storageBucket:"ecommonaglobal.firebasestorage.app",
  messagingSenderId:"945353153605",
  appId:"1:945353153605:web:df7119e7514cdc6c7a172c"
});
var db = firebase.firestore();

var USERS = ["MO","Nawid"];
var UCOL = {MO:"#60a5fa",Nawid:"#f59e0b"};
var DAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
var DNAMES = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
var TASKS = [
  {id:"work",label:"Arbeitsplatz Check-in",sub:"8 Uhr morgens",color:"#60a5fa"},
  {id:"tt1",label:"Product Research TikTok",sub:"Session 1 - 30 Min",color:"#e879f9"},
  {id:"tt2",label:"Product Research TikTok",sub:"Session 2 - 30 Min",color:"#e879f9"},
  {id:"ig1",label:"Product Research Instagram",sub:"Session 1 - 30 Min",color:"#f43f5e"},
  {id:"ig2",label:"Product Research Instagram",sub:"Session 2 - 30 Min",color:"#f43f5e"},
  {id:"vid",label:"Videos schneiden",sub:"3 Videos Ziel",color:"#34d399",hasCount:true,goal:3},
  {id:"sleep",label:"Sleep 23 Uhr",sub:"Spaetestens 23:00",color:"#94a3b8"}
];
var PIPELINE_STAGES = ["Gefunden","Analysiert","Getestet","Aktiv","Pausiert"];
var STAGE_COLORS = {Gefunden:"#60a5fa",Analysiert:"#e879f9",Getestet:"#f59e0b",Aktiv:"#34d399",Pausiert:"#555"};

var view = "day";
var cDay = 0;
var cOvTab = "week";
var cProduct = null;
var cPipeline = null;
var cProdSection = "research";
var cSelWeek = "";  // selected week key for week view
var cSelMonth = ""; // selected month key for month view
var cEditReview = ""; // review being edited
var W = "";
var mI = null;

var DATA = {chk:{},money:{},notes:{},checklist:{},absence:{},watchlist:[],products:[],pipeline:[],ideas:[]};
var REVIEWS = {};

function getWeekKey(){
  var d=new Date(),dy=d.getDay();
  var di=d.getDate()-dy+(dy===0?-6:1);
  var m=new Date(d.getFullYear(),d.getMonth(),di);
  return m.getFullYear()+"_"+m.getMonth()+"_"+m.getDate();
}
function weekKeyToLabel(k){
  var parts=k.split("_");
  if(parts.length<3)return k;
  var d=new Date(parseInt(parts[0]),parseInt(parts[1]),parseInt(parts[2]));
  var end=new Date(d.getFullYear(),d.getMonth(),d.getDate()+6);
  return d.getDate()+"."+(d.getMonth()+1)+". - "+end.getDate()+"."+(end.getMonth()+1)+"."+end.getFullYear();
}
function monthLabel(mk){
  var parts=mk.split("_");
  if(parts.length<2)return mk;
  var months=["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  return months[parseInt(parts[1])]+" "+parts[0];
}
function weekToMonth(wk){
  var p=wk.split("_");return p.length>=3?p[0]+"_"+p[1]:"";
}
function getAllWeekKeys(){
  var keys=[W];
  Object.keys(REVIEWS).forEach(function(k){if(keys.indexOf(k)===-1)keys.push(k);});
  return keys.sort(function(a,b){return b.localeCompare(a);});
}
function getAllMonthKeys(){
  var seen={};
  getAllWeekKeys().forEach(function(wk){seen[weekToMonth(wk)]=true;});
  return Object.keys(seen).sort(function(a,b){return b.localeCompare(a);});
}
function weeksInMonth(mk){
  return getAllWeekKeys().filter(function(wk){return weekToMonth(wk)===mk;});
}
function deleteReview(wk){
  delete REVIEWS[wk];saveReviews();cEditReview="";render();
}
function markReviewDone(wk){
  if(!REVIEWS[wk])REVIEWS[wk]={};
  REVIEWS[wk].done=true;saveReviews();render();
}
function todayIdx(){var map={1:0,2:1,3:2,4:3,5:4,6:5,0:6};return map[new Date().getDay()];}
function isSunday(){return new Date().getDay()===0;}

function loadData(){
  W=getWeekKey();
  db.collection("ec3").doc("global").onSnapshot(function(snap){
    if(snap.exists){
      var d=snap.data();
      DATA.watchlist=d.watchlist||[];
      DATA.products=d.products||[];
      DATA.pipeline=d.pipeline||[];
      DATA.ideas=d.ideas||[];
    }
    db.collection("ec3").doc(W).onSnapshot(function(snap2){
      if(snap2.exists){
        var d2=snap2.data();
        DATA.chk=d2.chk||{};
        DATA.money=d2.money||{};
        DATA.notes=d2.notes||{};
        DATA.checklist=d2.checklist||{};
        DATA.absence=d2.absence||{};
      }
      db.collection("ec3_reviews").doc("all").onSnapshot(function(snap3){
        if(snap3.exists)REVIEWS=snap3.data()||{};
        render();
        document.getElementById("bnav").style.display="flex";
      });
    });
  });
}

var saveGT=null,saveWT=null;
function saveGlobal(){
  clearTimeout(saveGT);
  saveGT=setTimeout(function(){
    db.collection("ec3").doc("global").set({
      watchlist:DATA.watchlist,products:DATA.products,
      pipeline:DATA.pipeline,ideas:DATA.ideas
    },{merge:true}).catch(function(){});
  },600);
}
function saveWeek(){
  clearTimeout(saveWT);
  saveWT=setTimeout(function(){
    db.collection("ec3").doc(W).set({
      chk:DATA.chk,money:DATA.money,notes:DATA.notes,
      checklist:DATA.checklist,absence:DATA.absence
    },{merge:true}).catch(function(){});
  },600);
}
function saveReviews(){
  db.collection("ec3_reviews").doc("all").set(REVIEWS,{merge:true}).catch(function(){});
}

function setTab(t){
  view=t;cProduct=null;cPipeline=null;
  document.querySelectorAll(".btab").forEach(function(b){b.classList.remove("active");});
  var el=document.getElementById("tab_"+t);if(el)el.classList.add("active");
  render();window.scrollTo(0,0);
}
window.setTab=setTab;

// Tasks
function toggleTask(day,user,taskId){
  DATA.chk[day+"_"+user+"_"+taskId]=!DATA.chk[day+"_"+user+"_"+taskId];
  saveWeek();render();
}
function setCount(day,user,taskId,val){
  DATA.chk[day+"_"+user+"_"+taskId+"_v"]=Math.max(0,val);
  saveWeek();
  var el=document.getElementById("cnt_"+day+"_"+user+"_"+taskId);
  if(el)el.innerHTML=countHTML(day,user,taskId);
}
function countHTML(day,user,taskId){
  var k=day+"_"+user+"_"+taskId+"_v",v=DATA.chk[k]||0,goal=3;
  var col=v>=goal?"#34d399":UCOL[user];
  var h="<div style='display:flex;align-items:center;gap:6px;margin-top:6px'>";
  h+="<button class='bc' onclick='setCount("+day+",\""+user+"\",\""+taskId+"\","+(v-1)+")'>-</button>";
  h+="<div style='flex:1;text-align:center'><span style='font-size:22px;font-weight:800;color:"+col+"'>"+v+"</span><span style='font-size:12px;color:#555'>/"+goal+"</span>";
  if(v>goal)h+=" <span class='bonus'>+"+( v-goal)+" BONUS</span>";
  h+="</div><button class='bc' onclick='setCount("+day+",\""+user+"\",\""+taskId+"\","+(v+1)+")'>+</button></div>";
  h+="<div class='bbg' style='margin-top:6px;overflow:hidden'><div class='bb' style='background:"+col+";width:"+Math.min(100,(v/goal)*100)+"%'></div></div>";
  return h;
}

// Money
function mStart(day,a){
  mStop();
  var k="d"+day;
  DATA.money[k]=Math.max(0,(DATA.money[k]||0)+a);
  saveWeek();refreshMoney(day);
  mI=setInterval(function(){
    DATA.money[k]=Math.max(0,(DATA.money[k]||0)+a);
    saveWeek();refreshMoney(day);
  },130);
}
function mStop(){if(mI){clearInterval(mI);mI=null;}}
function mAdj(day,a){DATA.money["d"+day]=Math.max(0,(DATA.money["d"+day]||0)+a);saveWeek();refreshMoney(day);}
function refreshMoney(day){var el=document.getElementById("mbox_"+day);if(el)el.innerHTML=moneyHTML(day);}
function moneyHTML(day){
  var v=DATA.money["d"+day]||0,col=v>0?"#34d399":"#555";
  var h="<div style='text-align:center;margin-bottom:12px'>";
  h+="<span style='font-size:36px;font-weight:800;color:"+col+"'>&#8364;"+v.toLocaleString()+"</span>";
  if(v>0)h+="<div style='font-size:11px;color:#34d399;margin-top:2px'>verdient heute</div>";
  h+="</div><div style='display:flex;align-items:center;gap:8px'>";
  h+="<button class='bc' ontouchstart='event.preventDefault();mStart("+day+",-10)' ontouchend='event.preventDefault();mStop()' onmousedown='mStart("+day+",-10)' onmouseup='mStop()' onmouseleave='mStop()'>-</button>";
  h+="<div style='display:flex;flex-direction:column;gap:4px;flex:1'>";
  h+="<button onclick='mAdj("+day+",-100)' style='background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:5px;color:#666;font-size:11px'>- 100</button>";
  h+="<button onclick='mAdj("+day+",100)' style='background:#1a1a1a;border:1px solid #222;border-radius:8px;padding:5px;color:#666;font-size:11px'>+ 100</button>";
  h+="</div><button class='bc' ontouchstart='event.preventDefault();mStart("+day+",10)' ontouchend='event.preventDefault();mStop()' onmousedown='mStart("+day+",10)' onmouseup='mStop()' onmouseleave='mStop()'>+</button></div>";
  return h;
}

// Notes / Absence / Checklist
function saveSharedNote(day,val){DATA.notes["shared_"+day]=val;saveWeek();}
function saveAbsence(day,user,val){DATA.absence[day+"_"+user]=val;saveWeek();}
function getCL(day){return DATA.checklist["d"+day]||[];}
function clHTML(day){
  var list=getCL(day);
  if(!list.length)return "<div style='font-size:12px;color:#333;padding:4px 0'>Noch keine Eintraege...</div>";
  var h="";
  for(var i=0;i<list.length;i++){
    var item=list[i];
    h+="<div onclick='toggleCL("+day+","+i+")' style='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a;cursor:pointer'>";
    h+="<div style='width:16px;height:16px;border-radius:4px;border:1px solid "+(item.done?"#34d399":"#333")+";background:"+(item.done?"#34d399":"transparent")+";flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000'>"+(item.done?"v":"")+"</div>";
    h+="<div style='font-size:13px;color:"+(item.done?"#444":"#e8e8e8")+";"+(item.done?"text-decoration:line-through":"")+">"+item.text+"</div></div>";
  }
  return h;
}
function addCLItem(day){
  var input=document.getElementById("cl_input_"+day);if(!input)return;
  var val=input.value.trim();if(!val)return;
  if(val[0]!=="-")val="- "+val;
  var list=getCL(day);list.push({text:val,done:false});
  DATA.checklist["d"+day]=list;saveWeek();input.value="";
  var el=document.getElementById("cl_list_"+day);if(el)el.innerHTML=clHTML(day);
}
function toggleCL(day,idx){
  var list=getCL(day);if(list[idx])list[idx].done=!list[idx].done;
  DATA.checklist["d"+day]=list;saveWeek();
  var el=document.getElementById("cl_list_"+day);if(el)el.innerHTML=clHTML(day);
}

// Watchlist
function wlText(item){ return typeof item==="string"?item:(item&&item.text?item.text:""); }
function wlLink(item){ return typeof item==="string"?"":( item&&item.link?item.link:""); }

function wlHTML(){
  var list=DATA.watchlist||[];
  if(!list.length)return "<div style='font-size:12px;color:#444;padding:8px 0'>Noch keine Produkte...</div>";
  var h="";
  for(var i=0;i<list.length;i++){
    var txt=wlText(list[i]),lnk=wlLink(list[i]);
    h+="<div style='background:#0a0a0a;border:1px solid #2a2a2a;border-radius:12px;padding:12px;margin-bottom:8px'>";
    h+="<div style='display:flex;justify-content:space-between;align-items:center'>";
    h+="<div style='font-size:14px;font-weight:700;color:#e8e8e8'>"+txt+"</div>";
    h+="<button onclick='event.stopPropagation();deleteWL("+i+")' style='background:#f43f5e22;border:1px solid #f43f5e44;border-radius:8px;color:#f43f5e;font-size:11px;padding:4px 10px'>Loeschen</button>";
    h+="</div>";
    if(lnk){
      h+="<div style='font-size:12px;color:#60a5fa;margin-top:6px;word-break:break-all'>"+lnk+"</div>";
    }else{
      h+="<div onclick='openWLLink("+i+")' style='font-size:11px;color:#444;margin-top:6px;cursor:pointer'>+ Link hinzufuegen</div>";
    }
    h+="</div>";
  }
  return h;
}

function openWLLink(idx){
  var item=DATA.watchlist[idx];
  var txt=wlText(item);
  var cur=wlLink(item);
  var val=prompt("Link fuer: "+txt,cur||"");
  if(val===null)return;
  if(typeof DATA.watchlist[idx]==="string"){
    DATA.watchlist[idx]={text:txt,link:val};
  }else{
    DATA.watchlist[idx].link=val;
  }
  saveGlobal();
  var el=document.getElementById("wl_list");if(el)el.innerHTML=wlHTML();
}

function deleteWL(idx){
  DATA.watchlist.splice(idx,1);
  saveGlobal();
  var el=document.getElementById("wl_list");
  if(el)el.innerHTML=wlHTML();
  else render();
}
function addWL(){
  var input=document.getElementById("wl_input");if(!input)return;
  var val=input.value.trim();if(!val)return;
  if(!DATA.watchlist)DATA.watchlist=[];
  DATA.watchlist.push({text:val,done:false});saveGlobal();input.value="";
  var el=document.getElementById("wl_list");
  if(el)el.innerHTML=wlHTML();
  else render();
}
function toggleWL(idx){
  if(!DATA.watchlist||!DATA.watchlist[idx])return;
  var item=DATA.watchlist[idx];
  if(typeof item==="string"){DATA.watchlist[idx]={text:item,done:true};}
  else{item.done=!item.done;}
  saveGlobal();
  var el=document.getElementById("wl_list");if(el)el.innerHTML=wlHTML();
}
function removeWL(idx){
  if(!DATA.watchlist)return;
  DATA.watchlist.splice(idx,1);saveGlobal();
  var el=document.getElementById("wl_list");
  if(el)el.innerHTML=wlHTML();
  else render();
}

// Ideas
function ideasHTML(){
  var list=DATA.ideas||[];
  if(!list.length)return "<div style='font-size:12px;color:#333;padding:4px 0'>Noch keine Ideen...</div>";
  var h="";
  for(var i=0;i<list.length;i++){
    h+="<div style='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a'>";
    h+="<div style='font-size:11px;color:#f59e0b;flex-shrink:0'>*</div>";
    h+="<div style='font-size:13px;color:#e8e8e8;flex:1'>"+DATA.ideas[i]+"</div>";
    h+="<button onclick='removeIdea("+i+")' style='background:none;color:#333;font-size:16px;padding:2px 6px'>x</button></div>";
  }
  return h;
}
function addIdea(){
  var input=document.getElementById("idea_input");if(!input)return;
  var val=input.value.trim();if(!val)return;
  DATA.ideas.push(val);saveGlobal();input.value="";
  var el=document.getElementById("idea_list");if(el)el.innerHTML=ideasHTML();
}
function removeIdea(idx){DATA.ideas.splice(idx,1);saveGlobal();var el=document.getElementById("idea_list");if(el)el.innerHTML=ideasHTML();}

// Products (Research)
function starsHTML(pid,user,val){
  var h="<div style='display:flex;gap:2px'>";
  for(var i=1;i<=5;i++){
    h+="<span onclick='setProductStar(\""+pid+"\",\""+user+"\","+i+")' style='font-size:20px;cursor:pointer;color:"+(i<=val?"#f59e0b":"#2a2a2a")+"'>&#9733;</span>";
  }
  h+="</div>";
  return h;
}
function setProductStar(pid,user,val){
  var p=getProdById(pid);if(!p)return;
  if(!p.stars)p.stars={};p.stars[user]=val;saveGlobal();
  var el=document.getElementById("stars_"+pid+"_"+user);if(el)el.innerHTML=starsHTML(pid,user,val);
}
function getProdById(pid){for(var i=0;i<DATA.products.length;i++){if(DATA.products[i].id===pid)return DATA.products[i];}return null;}
function addProduct(){
  var name=document.getElementById("prod_name");if(!name||!name.value.trim())return;
  DATA.products.push({id:"p"+Date.now(),name:name.value.trim(),ek:"",vk:"",stars:{MO:0,Nawid:0},concSocials:"",concWeb:"",notes:""});
  saveGlobal();name.value="";render();
}
function saveProductField(pid,field,val){var p=getProdById(pid);if(p){p[field]=val;saveGlobal();}}
function deleteProduct(pid){DATA.products=DATA.products.filter(function(p){return p.id!==pid;});saveGlobal();cProduct=null;render();}
function profit(p){var ek=parseFloat(p.ek)||0,vk=parseFloat(p.vk)||0;return vk>0&&ek>0?(vk-ek).toFixed(2):null;}
function avgStars(p){return (((p.stars&&p.stars.MO||0)+(p.stars&&p.stars.Nawid||0))/2).toFixed(1);}

// Pipeline
function getPipeById(pid){for(var i=0;i<DATA.pipeline.length;i++){if(DATA.pipeline[i].id===pid)return DATA.pipeline[i];}return null;}
function addPipeline(){
  var name=document.getElementById("pp_name");if(!name||!name.value.trim())return;
  DATA.pipeline.push({id:"pp"+Date.now(),name:name.value.trim(),stage:"Gefunden",socials:"",shops:"",niche:"",keywords:"",likes:"",concepts:""});
  saveGlobal();name.value="";render();
}
function savePipeField(pid,field,val){var p=getPipeById(pid);if(p){p[field]=val;saveGlobal();}}
function setPipeStage(pid,stage){var p=getPipeById(pid);if(p){p.stage=stage;saveGlobal();}var el=document.getElementById("stage_"+pid);if(el)el.innerHTML=stageHTML(pid);}
function stageHTML(pid){
  var p=getPipeById(pid);if(!p)return"";
  var h="<div style='display:flex;gap:4px;flex-wrap:wrap;margin-top:8px'>";
  for(var i=0;i<PIPELINE_STAGES.length;i++){
    var s=PIPELINE_STAGES[i],sc=STAGE_COLORS[s],sel=p.stage===s;
    h+="<button onclick='setPipeStage(\""+pid+"\",\""+s+"\")' style='font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid "+(sel?sc:"#333")+";background:"+(sel?sc+"22":"transparent")+";color:"+(sel?sc:"#555")+"'>"+s+"</button>";
  }

// Streak
function calcStreak(){
  var streak=0,today=todayIdx();
  for(var d=today;d>=0;d--){
    var allDone=true;
    for(var ui=0;ui<USERS.length&&allDone;ui++){
      for(var ti=0;ti<TASKS.length&&allDone;ti++){
        var t=TASKS[ti];
        if(t.hasCount){if((DATA.chk[d+"_"+USERS[ui]+"_"+t.id+"_v"]||0)<t.goal)allDone=false;}
        else{if(!DATA.chk[d+"_"+USERS[ui]+"_"+t.id])allDone=false;}
      }
    }
    if(allDone)streak++;else break;
  }
  return streak;
}

// Stats
function userDayDone(day,user){
  var done=0,total=TASKS.length;
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i];
    if(t.hasCount){if((DATA.chk[day+"_"+user+"_"+t.id+"_v"]||0)>=t.goal)done++;}
    else{if(DATA.chk[day+"_"+user+"_"+t.id])done++;}
  }
  return{done:done,total:total};
}
function weekTotal(){var t=0;for(var i=0;i<7;i++)t+=DATA.money["d"+i]||0;return t;}

// Reviews
function saveReview(wk,field,val){
  if(!REVIEWS[wk])REVIEWS[wk]={};
  REVIEWS[wk][field]=val;
  saveReviews();
}

// Reset
function resetDay(day){
  var prefix=day+"_",newChk={};
  for(var k in DATA.chk){if(k.indexOf(prefix)!==0)newChk[k]=DATA.chk[k];}
  DATA.chk=newChk;
  delete DATA.money["d"+day];
  delete DATA.notes["shared_"+day];
  delete DATA.checklist["d"+day];
  for(var ui=0;ui<USERS.length;ui++)delete DATA.absence[day+"_"+USERS[ui]];
  saveWeek();render();
}
function resetWeek(){
  DATA.chk={};DATA.money={};DATA.notes={};DATA.checklist={};DATA.absence={};
  saveWeek();render();
}

}

  var h="<div class='nav'><div style='flex:1;text-align:center;font-size:16px;font-weight:700'>Uebersicht</div></div>";
  h+="<div style='display:flex;gap:8px;padding:12px 16px 0'>";
  h+="<button class='dbtn"+(cOvTab==="week"?" active":"")+"' onclick='cOvTab=\"week\";render()'>Woche</button>";
  h+="<button class='dbtn"+(cOvTab==="review"?" active":"")+"' onclick='cOvTab=\"review\";render()'>Rueckblick</button>";
  h+="<button class='dbtn"+(cOvTab==="month"?" active":"")+"' onclick='cOvTab=\"month\";render()'>Monat</button>";
  h+="</div><div class='page'>";

  if(cOvTab==="week"){
    // Week selector
    h+="<div style='overflow-x:auto;display:flex;gap:6px;padding-bottom:4px'>";
    for(var wi=0;wi<allWeeks.length;wi++){
      var wk=allWeeks[wi],isCW=wk===cSelWeek;
      h+="<button onclick='cSelWeek=\""+wk+"\";render()' style='flex-shrink:0;padding:5px 10px;border-radius:10px;font-size:11px;white-space:nowrap;background:"+(isCW?"#60a5fa22":"#1a1a1a")+";color:"+(isCW?"#60a5fa":"#555")+";border:1px solid "+(isCW?"#60a5fa44":"#222")+"'>"+weekKeyToLabel(wk)+(wk===W?" (Aktuell)":"")+"</button>";
    }
    h+="</div>";

    // Show selected week stats
    var isCurrentWk=cSelWeek===W;
    var wt=0;
    if(isCurrentWk){
      wt=weekTotal();
      var streak=calcStreak();
      if(streak>0){
        h+="<div class='card' style='text-align:center;border-top:3px solid #f59e0b'>";
        h+="<div style='font-size:28px;font-weight:800;color:#f59e0b'>&#128293; "+streak+" Tage Streak</div>";
        h+="<div style='font-size:12px;color:#555;margin-top:4px'>Weiter so!</div></div>";
      }
      h+="<div class='card' style='text-align:center;border-top:3px solid #34d399'>";
      h+="<div class='st'>Einnahmen</div>";
      h+="<div style='font-size:44px;font-weight:800;color:"+(wt>0?"#34d399":"#444")+"'>&#8364;"+wt.toLocaleString()+"</div>";
      h+="<div style='display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:14px'>";
      var maxM=1;for(var i=0;i<7;i++){if((DATA.money["d"+i]||0)>maxM)maxM=DATA.money["d"+i];}
      for(var i=0;i<7;i++){
        var mv=DATA.money["d"+i]||0,isTd=i===todayIdx(),mpc=maxM>0?(mv/maxM)*100:0;
        h+="<div style='flex:1;display:flex;flex-direction:column;align-items:center;gap:2px'>";
        h+="<div style='font-size:9px;color:"+(mv>0?"#34d399":"#333")+"'>"+(mv>0?(mv>=1000?Math.round(mv/1000)+"k":mv):"")+"</div>";
        h+="<div style='width:100%;border-radius:3px 3px 0 0;background:"+(mv>0?"#34d399":"#1a1a1a")+";height:"+Math.max(3,mpc*0.5)+"px'></div>";
        h+="<div style='font-size:9px;color:"+(isTd?"#60a5fa":"#444")+"'>"+DAYS[i]+"</div></div>";
      }
      h+="</div></div>";
      h+="<div class='grid2'>";
      for(var ui=0;ui<USERS.length;ui++){
        var user=USERS[ui],uc=UCOL[user],td=0,ta=0;
        for(var di=0;di<7;di++){var r=userDayDone(di,user);td+=r.done;ta+=r.total;}
        var pct=ta>0?Math.round((td/ta)*100):0;
        h+="<div class='card' style='border-top:3px solid "+uc+";text-align:center'>";
        h+="<div style='font-size:13px;font-weight:700;color:"+uc+";margin-bottom:6px'>"+user+"</div>";
        h+="<div style='font-size:30px;font-weight:800;color:"+uc+"'>"+pct+"%</div>";
        h+="<div style='font-size:11px;color:#555;margin-top:2px'>"+td+"/"+ta+"</div>";
        h+="<div class='bbg' style='margin-top:8px'><div class='bb' style='background:"+uc+";width:"+pct+"%'></div></div></div>";
      }
      h+="</div>";
      h+="<div class='st'>Tag fuer Tag</div>";
      for(var di=0;di<7;di++){
        var isTd=di===todayIdx(),dc=isTd?"#60a5fa":"#2a2a2a",mv=DATA.money["d"+di]||0;
        h+="<div onclick='goDay("+di+")' style='background:#111;border:1px solid #222;border-left:3px solid "+dc+";border-radius:14px;padding:12px 14px;cursor:pointer'>";
        h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'>";
        h+="<div style='font-size:14px;font-weight:700'>"+DNAMES[di]+(isTd?" <span style='font-size:10px;color:#60a5fa'>Heute</span>":"")+"</div>";
        h+="<div style='font-size:13px;color:#34d399;font-weight:700'>&#8364;"+mv.toLocaleString()+"</div></div>";
        h+="<div class='grid2'>";
        for(var ui=0;ui<USERS.length;ui++){
          var user=USERS[ui],uc=UCOL[user],res=userDayDone(di,user);
          var pct2=res.total>0?Math.round((res.done/res.total)*100):0;
          h+="<div style='background:#0a0a0a;border-radius:8px;padding:6px 8px'>";
          h+="<div style='font-size:10px;color:"+uc+";font-weight:700;margin-bottom:4px'>"+user+"</div>";
          h+="<div style='font-size:13px;font-weight:700;color:"+(pct2===100?"#34d399":"#888")+"'>"+pct2+"%</div>";
          h+="<div class='bbg' style='margin-top:4px'><div class='bb' style='background:"+uc+";width:"+pct2+"%'></div></div></div>";
        }
        h+="</div>";
        var hasAbs=false;
        for(var ui=0;ui<USERS.length;ui++){if(DATA.absence[di+"_"+USERS[ui]])hasAbs=true;}
        if(hasAbs){
          h+="<div style='margin-top:8px;border-top:1px solid #1a1a1a;padding-top:8px'>";
          for(var ui=0;ui<USERS.length;ui++){
            var av=DATA.absence[di+"_"+USERS[ui]];
            if(av)h+="<div style='font-size:11px;color:#f59e0b;margin-top:3px'>"+USERS[ui]+": "+av+"</div>";
          }
          h+="</div>";
        }
        h+="</div>";
      }
      h+="<button onclick='resetWeek()' style='background:none;border:1px solid #1a1a1a;color:#333;font-size:11px;padding:8px;border-radius:12px;width:100%'>Woche zuruecksetzen</button>";
    }else{
      h+="<div class='card' style='text-align:center;color:#555;padding:20px'>Vergangene Woche - nur Ruckblick verfuegbar</div>";
      var rev=REVIEWS[cSelWeek];
      if(rev&&(rev.good||rev.bad||rev.change)){
        h+="<div class='card' style='border-top:3px solid #60a5fa'><div class='st'>Wochenrueckblick</div>";
        var rfs=[{key:"good",label:"Was lief gut?"},{key:"bad",label:"Was lief schlecht?"},{key:"change",label:"Was aendern wir?"}];
        for(var fi=0;fi<rfs.length;fi++){
          var val=rev[rfs[fi].key]||"";
          if(val){h+="<div style='margin-bottom:10px'><div style='font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase'>"+rfs[fi].label+"</div><div style='font-size:13px;color:#888;line-height:1.6'>"+val+"</div></div>";}
        }
        h+="</div>";
      }
    }
  }

  if(cOvTab==="review"){
    var rfields=[
      {key:"good",label:"Was lief gut?",ph:"Erfolge, Highlights..."},
      {key:"bad",label:"Was lief schlecht?",ph:"Probleme, Fehler..."},
      {key:"change",label:"Was aendern wir naechste Woche?",ph:"Konkrete Massnahmen..."}
    ];
    var allRevKeys=Object.keys(REVIEWS).sort(function(a,b){return b.localeCompare(a);});

    // Current week
    var curRev=REVIEWS[W]||{};
    var hasCur=curRev.good||curRev.bad||curRev.change;
    h+="<div class='card' style='border-top:3px solid #60a5fa'>";
    h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>";
    h+="<div class='st' style='margin-bottom:0'>Diese Woche</div>";
    if(hasCur&&!curRev.done){
      h+="<button onclick='markReviewDone(\""+W+"\")' style='font-size:11px;padding:4px 10px;border-radius:20px;background:#34d39922;color:#34d399;border:1px solid #34d39944'>Fertig</button>";
    }else if(curRev.done){
      h+="<span style='font-size:11px;color:#34d399'>Erledigt</span>";
    }
    h+="</div>";
    if(hasCur){
      for(var fi=0;fi<rfields.length;fi++){
        var f=rfields[fi],val=curRev[f.key]||"";
        if(val){h+="<div style='margin-bottom:8px'><div style='font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase'>"+f.label+"</div><div style='font-size:13px;color:#888;line-height:1.6'>"+val+"</div></div>";}
      }
      h+="<button onclick='goDay(6)' style='font-size:11px;padding:5px 12px;border-radius:10px;background:#1a1a1a;color:#555;border:1px solid #222;margin-top:4px'>Bearbeiten (Sonntag)</button>";
    }else{
      h+="<div style='font-size:12px;color:#333;padding:8px 0'>Noch kein Rueckblick. Sonntag ausfullen!</div>";
      h+="<button onclick='goDay(6)' style='font-size:11px;padding:5px 12px;border-radius:10px;background:#60a5fa22;color:#60a5fa;border:1px solid #60a5fa44;margin-top:6px'>Zum Sonntag</button>";
    }
    h+="</div>";

    // Past weeks
    var pastKeys=allRevKeys.filter(function(k){return k!==W;});
    if(pastKeys.length>0){
      h+="<div class='st' style='margin-top:4px'>Vorherige Wochen</div>";
      for(var wi=0;wi<pastKeys.length;wi++){
        var wk=pastKeys[wi],rev=REVIEWS[wk]||{};
        var isEdit=cEditReview===wk;
        h+="<div class='card' style='border-left:3px solid "+(rev.done?"#34d399":"#2a2a2a")+"'>";
        h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'>";
        h+="<div style='font-size:12px;font-weight:700;color:#666'>"+weekKeyToLabel(wk)+(rev.done?" <span style='color:#34d399;font-size:10px'>Fertig</span>":"")+"</div>";
        h+="<div style='display:flex;gap:6px'>";
        if(!rev.done)h+="<button onclick='markReviewDone(\""+wk+"\")' style='font-size:10px;padding:3px 8px;border-radius:8px;background:#34d39922;color:#34d399;border:1px solid #34d39944'>Fertig</button>";
        h+="<button onclick='cEditReview=\""+(isEdit?"":wk)+"\";render()' style='font-size:10px;padding:3px 8px;border-radius:8px;background:#60a5fa22;color:#60a5fa;border:1px solid #60a5fa44'>"+(isEdit?"Schliessen":"Edit")+"</button>";
        h+="<button onclick='deleteReview(\""+wk+"\")' style='font-size:10px;padding:3px 8px;border-radius:8px;background:#f43f5e22;color:#f43f5e;border:1px solid #f43f5e44'>Loeschen</button>";
        h+="</div></div>";
        if(isEdit){
          for(var fi=0;fi<rfields.length;fi++){
            var f=rfields[fi];
            h+="<div style='margin-bottom:10px'><div style='font-size:11px;color:#666;margin-bottom:4px'>"+f.label+"</div>";
            h+="<textarea class='narea' style='min-height:55px' placeholder='"+f.ph+"' onchange='saveReview(\""+wk+"\",\""+f.key+"\",this.value)' onblur='saveReview(\""+wk+"\",\""+f.key+"\",this.value)'>"+(rev[f.key]||"")+"</textarea></div>";
          }
        }else{
          for(var fi=0;fi<rfields.length;fi++){
            var val=rev[rfields[fi].key]||"";
            if(val){h+="<div style='margin-bottom:8px'><div style='font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase'>"+rfields[fi].label+"</div><div style='font-size:13px;color:#888;line-height:1.5'>"+val+"</div></div>";}
          }
        }
        h+="</div>";
      }
    }
  }

  if(cOvTab==="month"){
    // Month selector
    h+="<div style='overflow-x:auto;display:flex;gap:6px;padding-bottom:4px'>";
    for(var mi=0;mi<allMonths.length;mi++){
      var mk=allMonths[mi],isCM=mk===cSelMonth;
      h+="<button onclick='cSelMonth=\""+mk+"\";render()' style='flex-shrink:0;padding:5px 12px;border-radius:10px;font-size:11px;white-space:nowrap;background:"+(isCM?"#a78bfa22":"#1a1a1a")+";color:"+(isCM?"#a78bfa":"#555")+";border:1px solid "+(isCM?"#a78bfa44":"#222")+"'>"+monthLabel(mk)+"</button>";
    }
    h+="</div>";

    var monthWeeks=weeksInMonth(cSelMonth);
    var monthTotal=0;
    // For current week use live data, others show reviews
    h+="<div class='card' style='text-align:center;border-top:3px solid #34d399'>";
    h+="<div class='st'>"+monthLabel(cSelMonth)+" - Einnahmen</div>";
    if(monthWeeks.indexOf(W)!==-1){
      monthTotal+=weekTotal();
    }
    h+="<div style='font-size:40px;font-weight:800;color:"+(monthTotal>0?"#34d399":"#444")+"'>&#8364;"+monthTotal.toLocaleString()+"</div>";
    if(monthWeeks.length>1)h+="<div style='font-size:11px;color:#555;margin-top:4px'>Nur aktuelle Woche zaehlt in Echtzeit</div>";
    h+="</div>";

    // Week breakdown for month
    h+="<div class='st'>Wochen</div>";
    for(var wi=0;wi<monthWeeks.length;wi++){
      var wk=monthWeeks[wi],rev=REVIEWS[wk]||{};
      h+="<div class='card' style='border-left:3px solid "+(rev.done?"#34d399":"#2a2a2a")+"'>";
      h+="<div style='display:flex;justify-content:space-between;align-items:center'>";
      h+="<div style='font-size:13px;font-weight:700;color:#888'>"+weekKeyToLabel(wk)+(wk===W?" <span style='font-size:10px;color:#60a5fa'>Aktuell</span>":"")+"</div>";
      if(rev.done)h+="<span style='font-size:10px;color:#34d399'>Fertig</span>";
      h+="</div>";
      var hasSummary=rev.good||rev.bad||rev.change;
      if(hasSummary){
        var goodVal=rev.good||"";
        if(goodVal)h+="<div style='font-size:12px;color:#555;margin-top:6px;line-height:1.5'>"+goodVal.substring(0,100)+(goodVal.length>100?"...":"")+"</div>";
      }else{
        h+="<div style='font-size:11px;color:#333;margin-top:4px'>Kein Rueckblick</div>";
      }
      h+="</div>";
    }

    // Stats for current week in this month
    if(monthWeeks.indexOf(W)!==-1){
      h+="<div class='st' style='margin-top:4px'>Aufgaben diese Woche</div>";
      for(var ui=0;ui<USERS.length;ui++){
        var user=USERS[ui],uc=UCOL[user];
        h+="<div class='card' style='border-left:4px solid "+uc+"'>";
        h+="<div style='font-size:14px;font-weight:700;color:"+uc+";margin-bottom:10px'>"+user+"</div>";
        for(var ti=0;ti<TASKS.length;ti++){
          var task=TASKS[ti],taskDone=0;
          for(var di=0;di<7;di++){
            if(task.hasCount){taskDone+=Math.min(task.goal,DATA.chk[di+"_"+user+"_"+task.id+"_v"]||0);}
            else{if(DATA.chk[di+"_"+user+"_"+task.id])taskDone++;}
          }
          var taskMax=task.hasCount?task.goal*7:7,tpct=taskMax>0?Math.round((taskDone/taskMax)*100):0;
          h+="<div style='margin-bottom:8px'>";
          h+="<div style='display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px'>";
          h+="<span style='color:#888'>"+task.label+"</span><span style='color:"+uc+";font-weight:600'>"+taskDone+"/"+taskMax+"</span></div>";
          h+="<div class='bbg'><div class='bb' style='background:"+uc+";width:"+tpct+"%'></div></div></div>";
        }
        h+="</div>";
      }
    }
  }

  h+="</div>";
  return h;
}

// Global
window.goDay=function(d){
  view="day";if(d!==undefined)cDay=d;
  document.querySelectorAll(".btab").forEach(function(b){b.classList.remove("active");});
  var el=document.getElementById("tab_day");if(el)el.classList.add("active");
  render();window.scrollTo(0,0);
};
window.openProduct=function(pid){cProduct=pid;render();window.scrollTo(0,0);};
window.openPipeline=function(pid){cPipeline=pid;render();window.scrollTo(0,0);};
window.toggleTask=toggleTask;window.setCount=setCount;
window.mStart=mStart;window.mStop=mStop;window.mAdj=mAdj;
window.saveSharedNote=saveSharedNote;window.saveAbsence=saveAbsence;
window.addCLItem=addCLItem;window.toggleCL=toggleCL;
window.addWL=addWL;window.toggleWL=toggleWL;window.removeWL=removeWL;window.deleteWL=deleteWL;window.openWLLink=openWLLink;
window.addIdea=addIdea;window.removeIdea=removeIdea;
window.addProduct=addProduct;window.saveProductField=saveProductField;window.deleteProduct=deleteProduct;window.setProductStar=setProductStar;
window.addPipeline=addPipeline;window.savePipeField=savePipeField;window.setPipeStage=setPipeStage;window.stageHTML=stageHTML;window.deletePipeline=deletePipeline;
window.resetDay=resetDay;window.resetWeek=resetWeek;
window.saveReview=saveReview;
window.markReviewDone=markReviewDone;
window.deleteReview=deleteReview;

var d=new Date(),dy=d.getDay();
var map={1:0,2:1,3:2,4:3,5:4,6:5,0:6};
cDay=map[dy];
document.getElementById("tab_day").classList.add("active");
loadData();

// Swipe gestures
var TABS = ["day","products","overview"];
var swipeStartX=0,swipeStartY=0,swipeDir="";
document.addEventListener("touchstart",function(e){
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener("touchend",function(e){
  if(cProduct||cPipeline)return;
  var dx=e.changedTouches[0].clientX-swipeStartX;
  var dy2=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy2)*1.5)return;
  var cur=TABS.indexOf(view);
  if(cur===-1)return;
  if(dx<0&&cur<TABS.length-1){
    swipeDir="left";
    setTab(TABS[cur+1]);
  }else if(dx>0&&cur>0){
    swipeDir="right";
    setTab(TABS[cur-1]);
  }
},{passive:true});
</script>
</body>
</html>
